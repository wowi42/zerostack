name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease=""
          # Any semver pre-release tag (contains a hyphen, e.g. v1.5.1-rc2)
          # is published as a GitHub prerelease, never as "latest".
          if [[ "$tag" == *-* ]]; then
            prerelease="--prerelease"
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists, leaving it untouched"
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              $prerelease
          fi

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.96.0"
          target: ${{ matrix.target }}

      - name: Install gcc-aarch64-linux-gnu
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --all-features --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          tar czf zerostack-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release zerostack

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "zerostack-${{ matrix.target }}.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  build-static:
    name: ${{ matrix.target }}-static
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.96.0"

      - name: Install cross
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cross

      - name: Build static binary (${{ matrix.target }})
        run: cross build --release --all-features --target ${{ matrix.target }}

      - name: Rename and package
        run: |
          cp target/${{ matrix.target }}/release/zerostack zerostack-${{ matrix.target }}
          tar czf zerostack-${{ matrix.target }}.tar.gz zerostack-${{ matrix.target }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "zerostack-${{ matrix.target }}.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  checksums:
    name: SHA256SUMS
    needs: [build, build-static]
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist
          cd dist
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern '*.tar.gz'
          sha256sum *.tar.gz > SHA256SUMS
          gh release upload "$tag" SHA256SUMS --repo "$GITHUB_REPOSITORY" --clobber
