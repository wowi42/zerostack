version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    commit-message:
      prefix: build
    groups:
      cargo:
        patterns:
          - "*"
